# Ensure both Python (backend) and Node (frontend build) are available.
# Railway uses railway.json buildCommand; this file adds Node to the Nixpacks environment.
providers = ["python", "node"]

[phases.setup]
aptPkgs = ["curl"]

[phases.install]
cmds = [
  "curl -LsSf https://astral.sh/uv/install.sh | sh",
  "export PATH=\"$HOME/.local/bin:$PATH\" && uv pip install --system -r requirements.txt"
]
