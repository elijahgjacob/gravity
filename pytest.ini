[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

# Test markers for phase-based execution
markers =
    phase1: Phase 1 - Project Setup & Synthetic Data
    phase2: Phase 2 - Core API & RCSR Setup
    phase3: Phase 3 - Services Layer - Eligibility
    phase4: Phase 4 - Services Layer - Categories
    phase5: Phase 5 - Services Layer - Embedding & Search
    phase6: Phase 6 - Services Layer - Ranking
    phase7: Phase 7 - Controller Layer - Orchestration
    phase8: Phase 8 - Testing & Benchmarking
